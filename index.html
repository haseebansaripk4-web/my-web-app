<!DOCTYPE html>
<html>

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Trading Journal</title>

    <script src="https://unpkg.com/lucide@latest"></script>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <!-- ================= SAAS LOADING OVERLAY ================= -->
    <div id="saasLoader" class="saas-loader">
        <div class="loader-box">

            <div class="ultra-loader">
                <div class="ultra-core"></div>
                <span></span>
                <span></span>
                <span></span>
            </div>

            <h3>Loading Trading Engine</h3>
            <p>Syncing your performance data...</p>

        </div>
    </div>
    <div class="sidebar">
        <h3>TradeLog</h3>

        <button class="nav active" onclick="switchTab('dashboard')">Dashboard</button>
        <button class="nav" onclick="switchTab('trades')">Trades</button>
       
    </div>
    <!-- ================= LOGIN VIEW ================= -->
    <div id="loginView" class="center">
        <div class="login-box">

            <div class="logo-box center-logo">
                <div class="logo-icon"></div>
                <span>TradeLog</span>
            </div>

            <h2>Trading Journal</h2>

            <button onclick="login()" class="google-btn">
                <i data-lucide="log-in"></i>
                Login with Google
            </button>

        </div>
    </div>


    <!-- ================= DASHBOARD VIEW ================= -->
    <div id="dashboardView" style="display:none;">

        <header>
            <div class="header-left">
                <div class="logo-box">
                    <div class="logo-icon"></div>
                    <span>TradeLog</span>
                </div>
            </div>
          
        </header>

        <!-- BALANCE -->
        <div id="balanceSetup" class="popup" onclick="if(event.target === this) this.style.display='none'">
            <div>
                <h3>Enter Initial Balance</h3>
                <input type="number" id="initialBalance">
                <button onclick="saveBalance(); event.stopPropagation();">Save</button>
            </div>
        </div>

        <!-- CARDS -->
        <section class="cards">


            <div class="card">
                <i data-lucide="activity"></i>
                <p>Net</p>
                <span id="net"></span>
            </div>

            <div class="card green">
                <i data-lucide="trending-up"></i>
                <p>Profit</p>
                <span id="profit"></span>
            </div>

            <div class="card red">
                <i data-lucide="trending-down"></i>
                <p>Loss</p>
                <span id="loss"></span>
            </div>

            <div class="card">
                <i data-lucide="percent"></i>
                <p>Win Rate</p>
                <span id="win"></span>
            </div>

        </section>

        <button class="add-btn" onclick="openForm()">
            <i data-lucide="plus"></i> Add Trade
        </button>

        <!-- TABLE -->
        <table>
            <thead>
                <tr>
                    <th>Date</th>
                    <th>Pair</th>
                    <th>Dir</th>
                    <th>PnL</th>
                    <th>Emotion</th>
                    <th>Mistake</th>
                    <th>Note</th>
                    <th>View</th>
                </tr>
            </thead>
            <tbody id="journal"></tbody>
        </table>
        <div style="text-align:center; margin-top:10px;">
            <button onclick="switchTab('trades')" id="viewAllBtn" class="view-all-btn">
                View All Trades
            </button>
        </div>
        <!-- FORM -->
        <div id="formPopup" class="popup">
            <div>
                <button class="close-btn" onclick="closeForm()">✕</button>

                <input type="date" id="date">
                <input type="text" placeholder="Pair" id="BTCUSDT">

                <select id="direction">
                    <option>Long</option>
                    <option>Short</option>
                </select>

                <div class="pnl-type">
                    <button onclick="setType('profit')" id="profitBtn">Profit</button>
                    <button onclick="setType('loss')" id="lossBtn">Loss</button>
                </div>

                <input type="number" id="pnl" placeholder="$0.00">

                <select id="emotion">
                    <option>Confident</option>
                    <option>Fear</option>
                    <option>Greed</option>
                    <option>Revenge</option>
                </select>

                <select id="mistake">
                    <option>None</option>
                    <option>FOMO</option>
                    <option>No SL</option>
                    <option>Early Entry</option>
                    <option>Overtrading</option>
                    <option>Late Exit</option>
                </select>

                <input type="text" id="note" placeholder="Enter Note">
                <input type="text" id="link" placeholder="Image https://yourlink.com">

                <button onclick="addTrade()">Save</button>

            </div>
        </div>

    </div>
    <!-- ================= TRADES VIEW ================= -->
    <div class="container"></div>
    <div id="tradesView" style="display:none; padding:20px;">

        <h2>All Trades</h2>

        <table>
            <thead>
                <tr>
                    <th>Date</th>
                    <th>Pair</th>
                    <th>Dir</th>
                    <th>PnL</th>
                    <th>Emotion</th>
                    <th>Mistake</th>
                    <th>Note</th>
                    <th>View</th>
                </tr>
            </thead>
            <tbody id="tradesTable"></tbody>
        </table>

        <!-- Pagination -->
        <div id="pagination" style="text-align:center; margin-top:15px;"></div>

    </div>
    </div>
    <!-- IMAGE MODAL -->
    <div id="imgModal" class="img-modal" onclick="closeImage()">

        <!-- ❌ CLOSE BUTTON -->
        <button class="close-img" onclick="closeImage()">✕</button>

        <!-- IMAGE -->
        <img id="modalImg">

    </div>
    <!-- FIREBASE -->
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>

    <script src="firebase.js"></script>
    <script src="app.js"></script>

</body>

</html>
